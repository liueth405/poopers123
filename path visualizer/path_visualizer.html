<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path Planner Visualizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #1e1e1e;
            color: #d4d4d4;
        }
        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .panel {
            background-color: #252526;
            border: 1px solid #3e3e42;
            border-radius: 8px;
            padding: 15px;
        }
        .input-panel {
            flex: 1;
            min-width: 300px;
        }
        .canvas-panel {
            flex: 2;
            min-width: 500px;
        }
        h2 {
            margin-top: 0;
            color: #569cd6;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #9cdcfe;
        }
        textarea {
            width: 100%;
            height: 200px;
            background-color: #1e1e1e;
            color: #d4d4d4;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 10px;
            font-family: 'Courier New', monospace;
            resize: vertical;
        }
        button {
            background-color: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            margin-right: 10px;
        }
        button:hover {
            background-color: #1177bb;
        }
        button:disabled {
            background-color: #3e3e42;
            cursor: not-allowed;
        }
        select {
            background-color: #1e1e1e;
            color: #d4d4d4;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
            width: 100%;
        }
        .path-list {
            max-height: 150px;
            overflow-y: auto;
            background-color: #1e1e1e;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 5px;
            margin-top: 10px;
        }
        .path-item {
            padding: 8px;
            margin: 2px 0;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .path-item:hover {
            background-color: #3e3e42;
        }
        .path-item.selected {
            background-color: #0e639c;
        }
        .path-item .delete-btn {
            background-color: #d32f2f;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 5px;
        }
        .path-item .delete-btn:hover {
            background-color: #b71c1c;
        }
        canvas {
            background-color: #1e1e1e;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            cursor: crosshair;
        }
        .info {
            margin-top: 15px;
            padding: 10px;
            background-color: #2d2d30;
            border-radius: 4px;
            font-size: 14px;
        }
        .legend {
            margin-top: 10px;
            font-size: 12px;
        }
        .legend-item {
            display: inline-block;
            margin-right: 15px;
        }
        .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <h1>Path Planner Visualizer (Bezier Curves)</h1>
    
    <div style="margin-bottom: 15px;">
        <label for="fieldSelect">Select Field:</label>
        <select id="fieldSelect" onchange="changeField()">
            <option value="field.png">Field 1</option>
            <option value="field2.png">Field 2</option>
        </select>
    </div>
    
    <div class="container">
        <div class="panel input-panel">
            <h2>Waypoints Input</h2>
            <label for="waypoints">Enter waypoints (x, y pairs, one per line):</label>
            <textarea id="waypoints" placeholder="0, 0
-5, 7
-5, 20
-5, 30
-0.1, 28.5
0, 26">0, 0
-5, 7
-5, 20
-5, 30
-0.1, 28.5
0, 26</textarea>
            
            <button onclick="visualizePath()">Visualize Path</button>
            <button onclick="addNewPath()">Add New Path</button>
            <button onclick="deleteCurrentPath()">Delete Path</button>
            <button onclick="saveToCpp()">Save to C++</button>
            <button onclick="loadFromCpp()">Load from C++</button>
            <button onclick="clearCanvas()">Clear</button>
            <button onclick="loadExample()">Load Example</button>
            
            <div style="margin-top: 15px;">
                <label>Paths:</label>
                <div class="path-list" id="pathList"></div>
            </div>
            
            <div class="info">
                <strong>Instructions:</strong>
                <ul>
                    <li>Enter waypoints as x, y coordinates (one per line)</li>
                    <li>Click on canvas to add waypoints</li>
                    <li>At least 2 waypoints required</li>
                </ul>
            </div>
            
            <div class="legend">
                <div class="legend-item"><span class="dot" style="background: #ff4444;"></span>Waypoints</div>
                <div class="legend-item"><span class="dot" style="background: #44ff44;"></span>Control Points</div>
                <div class="legend-item"><span class="dot" style="background: #4488ff;"></span>Path</div>
            </div>
        </div>
        
        <div class="panel canvas-panel">
            <h2>Path Visualization</h2>
            <canvas id="canvas" width="800" height="600"></canvas>
            <div class="info" id="pathInfo">Path info will appear here</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let waypoints = [];
        let fieldImage = new Image();
        fieldImage.src = 'field.png';
        let imageLoaded = false;
        let isDragging = false;
        let dragIndex = -1;
        const waypointRadius = 10;
        
        // Multiple paths management
        let paths = [];
        let currentPathIndex = 0;
        const pathColors = ['#4488ff', '#ff44ff', '#44ff44', '#ffff44', '#ff8844', '#44ffff'];
        
        function changeField() {
            const fieldSelect = document.getElementById('fieldSelect');
            const newSrc = fieldSelect.value;
            
            // Force complete reload by clearing src first
            fieldImage.src = '';
            setTimeout(() => {
                fieldImage.src = newSrc;
                imageLoaded = false;
            }, 10);
        }
        
        // Handle image loading for both initial load and field switching
        fieldImage.onload = function() {
            imageLoaded = true;
            // Set canvas size to match image aspect ratio
            const aspectRatio = fieldImage.width / fieldImage.height;
            canvas.height = canvas.width / aspectRatio;
            // Initialize first path if not already done
            if (paths.length === 0) {
                initializeFirstPath();
            }
            visualizePath();
        };
        
        fieldImage.onerror = function() {
            console.error('Failed to load field image:', fieldImage.src);
            alert('Failed to load field image: ' + fieldImage.src);
        };
        
        // PathVec2 structure matching the C++ code
        class PathVec2 {
            constructor(x, y) {
                this.x = x;
                this.y = y;
            }
            
            add(v) { return new PathVec2(this.x + v.x, this.y + v.y); }
            sub(v) { return new PathVec2(this.x - v.x, this.y - v.y); }
            mul(s) { return new PathVec2(this.x * s, this.y * s); }
            norm() { return Math.sqrt(this.x * this.x + this.y * this.y); }
        }
        
        // BezierSegment structure
        class BezierSegment {
            constructor(p0, p1, p2, p3) {
                this.p0 = p0;
                this.p1 = p1;
                this.p2 = p2;
                this.p3 = p3;
                this.length = 0;
            }
            
            evaluate(t) {
                const u = 1.0 - t;
                const tt = t * t;
                const uu = u * u;
                const uuu = uu * u;
                const ttt = tt * t;
                
                let p = this.p0.mul(uuu);
                p = p.add(this.p1.mul(3.0 * uu * t));
                p = p.add(this.p2.mul(3.0 * u * tt));
                p = p.add(this.p3.mul(ttt));
                return p;
            }
            
            derivative(t) {
                const u = 1.0 - t;
                let dp = this.p1.sub(this.p0).mul(3.0 * u * u);
                dp = dp.add(this.p2.sub(this.p1).mul(6.0 * u * t));
                dp = dp.add(this.p3.sub(this.p2).mul(3.0 * t * t));
                return dp;
            }
        }
        
        // Gauss quadrature for arc length computation
        function computeArcLengthGauss(seg, a, b) {
            const x = [0.0, 0.5384693101056831, -0.5384693101056831,
                      0.9061798459386640, -0.9061798459386640];
            const w = [0.5688888888888889, 0.4786286704993665,
                      0.4786286704993665, 0.2369268850561891,
                      0.2369268850561891];
            
            let sum = 0.0;
            const hd = 0.5 * (b - a);
            const hs = 0.5 * (a + b);
            
            for (let i = 0; i < 5; ++i) {
                sum += w[i] * seg.derivative(hd * x[i] + hs).norm();
            }
            return hd * sum;
        }
        
        // Build Bezier segments from waypoints (matching C++ algorithm)
        function buildSegments(waypoints) {
            const n = waypoints.length - 1;
            const segments = [];
            
            if (n < 1) return { segments, totalLength: 0 };
            
            const L = [];
            for (let i = 0; i < n; ++i) {
                L[i] = Math.max(waypoints[i + 1].sub(waypoints[i]).norm(), 1e-6);
            }
            
            if (n === 1) {
                segments[0] = new BezierSegment(
                    waypoints[0],
                    waypoints[0].add(waypoints[1].sub(waypoints[0]).mul(1.0 / 3.0)),
                    waypoints[0].add(waypoints[1].sub(waypoints[0]).mul(2.0 / 3.0)),
                    waypoints[1]
                );
            } else {
                // Thomas Algorithm
                const cp = new Array(n + 1);
                const dp = new Array(n + 1);
                const V = new Array(n + 1);
                
                cp[0] = 1.0 / 2.0;
                dp[0] = waypoints[1].sub(waypoints[0]).mul(3.0 / L[0]).mul(1.0 / 2.0);
                
                for (let i = 1; i < n; ++i) {
                    const denom = 2.0 * (L[i - 1] + L[i]) - L[i] * cp[i - 1];
                    cp[i] = L[i - 1] / denom;
                    const d_i = waypoints[i + 1].sub(waypoints[i]).mul(3.0 * L[i - 1] / L[i])
                              .add(waypoints[i].sub(waypoints[i - 1]).mul(3.0 * L[i] / L[i - 1]));
                    dp[i] = d_i.sub(dp[i - 1].mul(L[i])).mul(1.0 / denom);
                }
                
                const denom_n = 2.0 - cp[n - 1];
                dp[n] = waypoints[n].sub(waypoints[n - 1]).mul(3.0 / L[n - 1])
                        .sub(dp[n - 1]).mul(1.0 / denom_n);
                
                V[n] = dp[n];
                for (let i = n - 1; i >= 0; --i) {
                    V[i] = dp[i].sub(V[i + 1].mul(cp[i]));
                }
                
                for (let i = 0; i < n; ++i) {
                    segments[i] = new BezierSegment(
                        waypoints[i],
                        waypoints[i].add(V[i].mul(L[i] / 3.0)),
                        waypoints[i + 1].sub(V[i + 1].mul(L[i] / 3.0)),
                        waypoints[i + 1]
                    );
                }
            }
            
            // Compute segment lengths
            let totalLength = 0;
            for (let i = 0; i < n; ++i) {
                segments[i].length = computeArcLengthGauss(segments[i], 0.0, 1.0);
                totalLength += segments[i].length;
            }
            
            return { segments, totalLength };
        }
        
        function parseWaypoints(text) {
            const lines = text.trim().split('\n');
            const result = [];
            
            for (const line of lines) {
                const parts = line.split(',').map(s => parseFloat(s.trim()));
                if (parts.length >= 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                    result.push(new PathVec2(parts[0], parts[1]));
                }
            }
            
            return result;
        }
        
        function getScaleAndOffset() {
            // Fixed coordinate range from -72 to 72
            const minCoord = -72;
            const maxCoord = 72;
            const width = maxCoord - minCoord;
            const height = maxCoord - minCoord;
            
            const padding = 0;
            const scaleX = (canvas.width - 2 * padding) / width;
            const scaleY = (canvas.height - 2 * padding) / height;
            const scale = Math.min(scaleX, scaleY);
            
            const offsetX = padding + (canvas.width - 2 * padding - width * scale) / 2 - minCoord * scale;
            const offsetY = padding + (canvas.height - 2 * padding - height * scale) / 2 - minCoord * scale;
            
            return { scale, offsetX, offsetY };
        }
        
        function toCanvas(point, scale, offsetX, offsetY) {
            return {
                x: point.x * scale + offsetX,
                y: canvas.height - (point.y * scale + offsetY)
            };
        }
        
        function drawPoint(point, color, radius, scale, offsetX, offsetY) {
            const canvasPoint = toCanvas(point, scale, offsetX, offsetY);
            ctx.beginPath();
            ctx.arc(canvasPoint.x, canvasPoint.y, radius, 0, 2 * Math.PI);
            ctx.fillStyle = color;
            ctx.fill();
            return canvasPoint;
        }
        
        function drawLine(p1, p2, color, lineWidth, scale, offsetX, offsetY) {
            const cp1 = toCanvas(p1, scale, offsetX, offsetY);
            const cp2 = toCanvas(p2, scale, offsetX, offsetY);
            ctx.beginPath();
            ctx.moveTo(cp1.x, cp1.y);
            ctx.lineTo(cp2.x, cp2.y);
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.stroke();
        }
        
        function visualizePath() {
            const text = document.getElementById('waypoints').value;
            waypoints = parseWaypoints(text);
            
            if (waypoints.length < 2) {
                alert('Please enter at least 2 waypoints');
                return;
            }
            
            // Save current path to paths array
            if (paths[currentPathIndex]) {
                paths[currentPathIndex].waypoints = waypoints;
            } else {
                paths[currentPathIndex] = {
                    name: `Path ${currentPathIndex + 1}`,
                    waypoints: waypoints,
                    color: pathColors[currentPathIndex % pathColors.length]
                };
            }
            
            const { scale, offsetX, offsetY } = getScaleAndOffset();
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw field image as background
            if (imageLoaded) {
                ctx.drawImage(fieldImage, 0, 0, canvas.width, canvas.height);
            }
            
            // Draw all paths
            for (let i = 0; i < paths.length; i++) {
                if (!paths[i] || paths[i].waypoints.length < 2) continue;
                
                const pathWaypoints = paths[i].waypoints;
                const { segments, totalLength } = buildSegments(pathWaypoints);
                const isCurrentPath = (i === currentPathIndex);
                const pathColor = paths[i].color;
                
                // Draw control polygon (only for current path)
                if (isCurrentPath) {
                    ctx.setLineDash([5, 5]);
                    for (const seg of segments) {
                        drawLine(seg.p0, seg.p1, '#666666', 1, scale, offsetX, offsetY);
                        drawLine(seg.p1, seg.p2, '#666666', 1, scale, offsetX, offsetY);
                        drawLine(seg.p2, seg.p3, '#666666', 1, scale, offsetX, offsetY);
                    }
                    ctx.setLineDash([]);
                }
                
                // Draw Bezier curves
                ctx.strokeStyle = pathColor;
                ctx.lineWidth = isCurrentPath ? 3 : 2;
                if (!isCurrentPath) ctx.globalAlpha = 0.5;
                for (const seg of segments) {
                    ctx.beginPath();
                    const start = toCanvas(seg.evaluate(0), scale, offsetX, offsetY);
                    ctx.moveTo(start.x, start.y);
                    
                    for (let t = 0.01; t <= 1.0; t += 0.01) {
                        const point = toCanvas(seg.evaluate(t), scale, offsetX, offsetY);
                        ctx.lineTo(point.x, point.y);
                    }
                    ctx.stroke();
                }
                ctx.globalAlpha = 1.0;
                
                // Draw waypoints (only for current path)
                if (isCurrentPath) {
                    for (let j = 0; j < pathWaypoints.length; j++) {
                        const color = (j === dragIndex) ? '#ffff00' : '#ff4444';
                        drawPoint(pathWaypoints[j], color, 8, scale, offsetX, offsetY);
                    }
                    
                    // Draw control points
                    for (const seg of segments) {
                        drawPoint(seg.p1, '#44ff44', 4, scale, offsetX, offsetY);
                        drawPoint(seg.p2, '#44ff44', 4, scale, offsetX, offsetY);
                    }
                }
            }
            
            // Update path list UI
            updatePathList();
            
            // Update info
            const currentPathData = paths[currentPathIndex];
            if (currentPathData && currentPathData.waypoints.length >= 2) {
                const { totalLength } = buildSegments(currentPathData.waypoints);
                document.getElementById('pathInfo').innerHTML = 
                    `<strong>Path Info:</strong><br>` +
                    `Current: ${currentPathData.name}<br>` +
                    `Waypoints: ${currentPathData.waypoints.length}<br>` +
                    `Total Length: ${totalLength.toFixed(2)} units<br>` +
                    `Total Paths: ${paths.length}`;
            }
        }
        
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('waypoints').value = '';
            waypoints = [];
            if (paths[currentPathIndex]) {
                paths[currentPathIndex].waypoints = [];
            }
            document.getElementById('pathInfo').innerHTML = 'Path info will appear here';
        }
        
        function saveToCpp() {
            let cppCode = '';
            for (let i = 0; i < paths.length; i++) {
                if (!paths[i] || paths[i].waypoints.length < 2) continue;
                
                const pathName = paths[i].name.replace(/\s+/g, '').toLowerCase();
                cppCode += `PathTarget ${pathName};\n`;
                cppCode += `${pathName}.waypoints.push_back({${paths[i].waypoints[0].x.toFixed(1)}, ${paths[i].waypoints[0].y.toFixed(1)}});\n`;
                
                for (let j = 1; j < paths[i].waypoints.length; j++) {
                    cppCode += `${pathName}.waypoints.push_back({${paths[i].waypoints[j].x.toFixed(1)}, ${paths[i].waypoints[j].y.toFixed(1)}});`;
                    if (j < paths[i].waypoints.length - 1) {
                        cppCode += `  // intermediate`;
                    } else {
                        cppCode += `   // end`;
                    }
                    cppCode += '\n';
                }
                cppCode += '\n';
            }
            
            // Create a modal to show the code
            const modal = document.createElement('div');
            modal.id = 'cppModal';
            modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;z-index:10000;';
            modal.innerHTML = `
                <div style="background:#252526;padding:20px;border-radius:8px;max-width:80%;max-height:80%;overflow:auto;">
                    <h3 style="color:#569cd6;margin-top:0;">C++ Path Code</h3>
                    <textarea id="cppOutput" style="width:600px;height:400px;background:#1e1e1e;color:#d4d4d4;border:1px solid #3e3e42;border-radius:4px;padding:10px;font-family:monospace;resize:both;">${cppCode}</textarea>
                    <div style="margin-top:10px;">
                        <button onclick="copyCppCode()" style="background:#0e639c;color:white;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;">Copy to Clipboard</button>
                        <button onclick="closeModal()" style="background:#3e3e42;color:white;border:none;padding:10px 20px;border-radius:4px;cursor:pointer;margin-left:10px;">Close</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function closeModal() {
            const modal = document.getElementById('cppModal');
            if (modal) {
                modal.remove();
            }
        }
        
        function copyCppCode() {
            const cppOutput = document.getElementById('cppOutput');
            cppOutput.select();
            document.execCommand('copy');
            alert('C++ code copied to clipboard!');
        }
        
        function loadFromCpp() {
            const cppCode = prompt('Paste your C++ path code here (e.g., path1.waypoints.push_back({0, 0});):');
            if (!cppCode) return;
            
            // Parse the C++ code to extract waypoints
            const lines = cppCode.split('\n');
            const newPaths = [];
            let currentPath = null;
            let pathIndex = 0;
            
            for (const line of lines) {
                // Check if line defines a PathTarget
                const pathMatch = line.match(/PathTarget\s+(\w+);/);
                if (pathMatch) {
                    if (currentPath && currentPath.waypoints.length >= 2) {
                        newPaths.push(currentPath);
                    }
                    currentPath = {
                        name: pathMatch[1],
                        waypoints: [],
                        color: pathColors[pathIndex % pathColors.length]
                    };
                    pathIndex++;
                    continue;
                }
                
                // Check if line has waypoints.push_back
                const waypointMatch = line.match(/\.waypoints\.push_back\(\{([^,]+),\s*([^}]+)\}\);/);
                if (waypointMatch && currentPath) {
                    const x = parseFloat(waypointMatch[1]);
                    const y = parseFloat(waypointMatch[2]);
                    if (!isNaN(x) && !isNaN(y)) {
                        currentPath.waypoints.push(new PathVec2(x, y));
                    }
                }
            }
            
            // Add the last path
            if (currentPath && currentPath.waypoints.length >= 2) {
                newPaths.push(currentPath);
            }
            
            if (newPaths.length === 0) {
                alert('No valid paths found in the C++ code. Make sure the format is:\nPathTarget path1;\npath1.waypoints.push_back({x, y});');
                return;
            }
            
            // Replace all paths with loaded ones
            paths = newPaths;
            currentPathIndex = 0;
            waypoints = paths[0].waypoints;
            updateWaypointText();
            updatePathList();
            visualizePath();
        }
        
        function addNewPath() {
            const newIndex = paths.length;
            paths[newIndex] = {
                name: `Path ${newIndex + 1}`,
                waypoints: [],
                color: pathColors[newIndex % pathColors.length]
            };
            currentPathIndex = newIndex;
            document.getElementById('waypoints').value = '';
            waypoints = [];
            updatePathList();
            visualizePath();
        }
        
        function deleteCurrentPath() {
            if (paths.length <= 1) {
                alert('Cannot delete the only path');
                return;
            }
            
            paths.splice(currentPathIndex, 1);
            
            // Adjust current index if needed
            if (currentPathIndex >= paths.length) {
                currentPathIndex = paths.length - 1;
            }
            
            // Load the current path waypoints
            if (paths[currentPathIndex]) {
                waypoints = paths[currentPathIndex].waypoints;
                updateWaypointText();
            } else {
                waypoints = [];
                document.getElementById('waypoints').value = '';
            }
            
            updatePathList();
            visualizePath();
        }
        
        function selectPath(index) {
            currentPathIndex = index;
            waypoints = paths[index].waypoints;
            updateWaypointText();
            visualizePath();
        }
        
        function updatePathList() {
            const pathList = document.getElementById('pathList');
            pathList.innerHTML = '';
            
            for (let i = 0; i < paths.length; i++) {
                if (!paths[i]) continue;
                
                const pathItem = document.createElement('div');
                pathItem.className = `path-item ${i === currentPathIndex ? 'selected' : ''}`;
                pathItem.innerHTML = `
                    <span style="color: ${paths[i].color}">● ${paths[i].name}</span>
                    <button class="delete-btn" onclick="event.stopPropagation(); deletePath(${i})">✕</button>
                `;
                pathItem.onclick = () => selectPath(i);
                pathList.appendChild(pathItem);
            }
        }
        
        function deletePath(index) {
            if (paths.length <= 1) {
                alert('Cannot delete the only path');
                return;
            }
            
            paths.splice(index, 1);
            
            // Adjust current index if needed
            if (currentPathIndex >= paths.length) {
                currentPathIndex = paths.length - 1;
            } else if (currentPathIndex === index && currentPathIndex > 0) {
                currentPathIndex--;
            }
            
            // Load the current path waypoints
            if (paths[currentPathIndex]) {
                waypoints = paths[currentPathIndex].waypoints;
                updateWaypointText();
            } else {
                waypoints = [];
                document.getElementById('waypoints').value = '';
            }
            
            updatePathList();
            visualizePath();
        }
        
        function loadExample() {
            document.getElementById('waypoints').value = 
                `0, 0
-5, 7
-5, 20
-5, 30
-0.1, 28.5
0, 26`;
            visualizePath();
        }
        
        function updateWaypointText() {
            const text = waypoints.map(wp => `${wp.x.toFixed(1)}, ${wp.y.toFixed(1)}`).join('\n');
            document.getElementById('waypoints').value = text;
            // Also update the current path in the paths array
            if (paths[currentPathIndex]) {
                paths[currentPathIndex].waypoints = waypoints;
            }
        }
        
        function findWaypointAtPosition(mouseX, mouseY) {
            const { scale, offsetX, offsetY } = getScaleAndOffset();
            
            for (let i = 0; i < waypoints.length; i++) {
                const canvasPoint = toCanvas(waypoints[i], scale, offsetX, offsetY);
                const dx = mouseX - canvasPoint.x;
                const dy = mouseY - canvasPoint.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < waypointRadius) {
                    return i;
                }
            }
            return -1;
        }
        
        // Mouse down - start dragging
        canvas.addEventListener('mousedown', function(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const index = findWaypointAtPosition(x, y);
            
            if (index !== -1) {
                isDragging = true;
                dragIndex = index;
                canvas.style.cursor = 'grabbing';
                visualizePath();
            }
        });
        
        // Mouse move - drag waypoint or update cursor
        canvas.addEventListener('mousemove', function(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (isDragging && dragIndex !== -1) {
                const { scale, offsetX, offsetY } = getScaleAndOffset();
                const worldX = (x - offsetX) / scale;
                const worldY = (canvas.height - y - offsetY) / scale;
                
                waypoints[dragIndex].x = worldX;
                waypoints[dragIndex].y = worldY;
                
                updateWaypointText();
                visualizePath();
            } else {
                const index = findWaypointAtPosition(x, y);
                canvas.style.cursor = (index !== -1) ? 'grab' : 'crosshair';
            }
        });
        
        // Mouse up - stop dragging
        canvas.addEventListener('mouseup', function() {
            if (isDragging) {
                isDragging = false;
                dragIndex = -1;
                canvas.style.cursor = 'crosshair';
                visualizePath();
            }
        });
        
        // Mouse leave - stop dragging if mouse leaves canvas
        canvas.addEventListener('mouseleave', function() {
            if (isDragging) {
                isDragging = false;
                dragIndex = -1;
                canvas.style.cursor = 'crosshair';
                visualizePath();
            }
        });
        
        // Click on canvas to add waypoints (if not dragging)
        canvas.addEventListener('click', function(e) {
            if (isDragging) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Check if clicking on existing waypoint
            const index = findWaypointAtPosition(x, y);
            if (index !== -1) return;
            
            // Use fixed coordinate system
            const { scale, offsetX, offsetY } = getScaleAndOffset();
            
            const worldX = (x - offsetX) / scale;
            const worldY = (canvas.height - y - offsetY) / scale;
            
            const textarea = document.getElementById('waypoints');
            textarea.value += `\n${worldX.toFixed(1)}, ${worldY.toFixed(1)}`;
            
            visualizePath();
        });
        
        // Initialize first path with example waypoints
        function initializeFirstPath() {
            const exampleWaypoints = `0, 0
-5, 7
-5, 20
-5, 30
-0.1, 28.5
0, 26`;
            
            document.getElementById('waypoints').value = exampleWaypoints;
            waypoints = parseWaypoints(exampleWaypoints);
            
            paths[0] = {
                name: 'Path 1',
                waypoints: waypoints,
                color: pathColors[0]
            };
            
            currentPathIndex = 0;
            updatePathList();
        }
    </script>
</body>
</html>
